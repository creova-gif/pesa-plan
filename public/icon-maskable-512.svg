<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="coin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (no rounded corners — maskable icons are cropped by OS) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="white" opacity="0.05"/>
  <!-- Safe zone: center 80% = 204px inset on each side = 102..410 -->
  <!-- Coin -->
  <circle cx="256" cy="230" r="120" fill="url(#coin)" opacity="0.97"/>
  <circle cx="256" cy="230" r="100" fill="none" stroke="#fde68a" stroke-width="5" opacity="0.4"/>
  <text x="256" y="278" font-family="system-ui,sans-serif" font-size="118" font-weight="900" text-anchor="middle" fill="#92400e">$</text>
  <!-- Label -->
  <text x="256" y="400" font-family="system-ui,sans-serif" font-size="42" font-weight="900" text-anchor="middle" fill="white" letter-spacing="6" opacity="0.9">PESAPLAN</text>
</svg>
